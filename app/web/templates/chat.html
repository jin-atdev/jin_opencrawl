<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jin비서</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg-base: #1e1e24;
    --bg-surface: #232329;
    --bg-elevated: #27272a;
    --bg-input: #1a1a20;
    --text-primary: #d4d4d8;
    --text-secondary: #a1a1aa;
    --text-muted: #71717a;
    --text-faint: #52525b;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.1);
    --hover: rgba(255,255,255,0.05);
    --hover-strong: rgba(255,255,255,0.08);
    --accent: #22d3ee;
    --accent-light: #67e8f9;
    --accent-dim: rgba(34,211,238,0.3);
    --accent-glow: rgba(34,211,238,0.1);
    --accent-rgb: 34,211,238;
    --success: #10b981;
    --error: #f87171;
    --warning: #f59e0b;
    --scrollbar-thumb: #52525b;
    --scrollbar-track: #27272a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ─── Sidebar ─── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  #sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #sidebar-header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #sidebar-header h1 span {
    color: var(--accent);
  }

  #new-chat-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border-strong);
    background: transparent;
    color: var(--text-secondary);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  #new-chat-btn:hover {
    background: var(--hover-strong);
    color: var(--accent);
    border-color: var(--accent-dim);
  }

  #chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .chat-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 2px;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .chat-item:hover { background: var(--hover); }
  .chat-item.active { background: var(--hover-strong); }

  .chat-item-title {
    font-size: 13px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .chat-item.active .chat-item-title { color: var(--text-primary); }

  .chat-item-delete {
    opacity: 0;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    border-radius: 4px;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .chat-item:hover .chat-item-delete { opacity: 1; }
  .chat-item-delete:hover { color: var(--error); background: rgba(248,113,113,0.1); }

  #sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--success);
    flex-shrink: 0;
  }

  .status-dot.disconnected { background: var(--error); }

  #connection-status {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ─── Main Area ─── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  #chat-header {
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #chat-header .session-label {
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* ─── Messages ─── */
  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .message-group {
    display: flex;
    gap: 12px;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
  }

  .message-group.user { justify-content: flex-end; }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-avatar.assistant-avatar {
    background: var(--accent-glow);
    color: var(--accent);
    border: 1px solid var(--accent-dim);
  }

  .msg-avatar.user-avatar {
    background: rgba(var(--accent-rgb),0.08);
    color: var(--accent-light);
    border: 1px solid rgba(var(--accent-rgb),0.2);
  }

  .msg-content {
    padding: 10px 14px;
    border-radius: 10px;
    line-height: 1.65;
    font-size: 14px;
    word-break: break-word;
    max-width: 85%;
  }

  .msg-content.user-msg {
    background: rgba(var(--accent-rgb),0.08);
    border: 1px solid rgba(var(--accent-rgb),0.2);
    color: var(--text-primary);
    border-bottom-right-radius: 4px;
  }

  .msg-content.assistant-msg {
    background: rgba(39,39,42,0.4);
    border: 1px solid var(--border);
    color: var(--text-primary);
    border-bottom-left-radius: 4px;
  }

  .msg-content p { margin-bottom: 8px; }
  .msg-content p:last-child { margin-bottom: 0; }

  .msg-content code {
    background: var(--bg-input);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
  }

  .msg-content pre {
    background: var(--bg-input);
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
    border: 1px solid var(--border);
  }

  .msg-content pre code { background: none; padding: 0; }

  .msg-content ul, .msg-content ol {
    padding-left: 20px;
    margin: 8px 0;
  }

  .msg-content a { color: var(--accent); text-decoration: none; }
  .msg-content a:hover { text-decoration: underline; }

  .msg-content blockquote {
    border-left: 3px solid var(--accent-dim);
    padding-left: 12px;
    margin: 8px 0;
    color: var(--text-secondary);
  }

  /* ─── Error message ─── */
  .error-msg {
    text-align: center;
    padding: 8px 16px;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 8px;
    color: var(--error);
    font-size: 13px;
    max-width: 800px;
    margin: 0 auto;
    width: 100%;
  }

  /* ─── Interrupt ─── */
  .interrupt-card {
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    background: var(--bg-surface);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 10px;
    padding: 16px;
  }

  .interrupt-card h3 {
    color: var(--warning);
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .interrupt-action {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }

  .interrupt-action .tool-name {
    color: var(--success);
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 4px;
  }

  .interrupt-action .tool-args {
    color: var(--text-muted);
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 12px;
    white-space: pre-wrap;
  }

  .interrupt-buttons {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .interrupt-buttons button {
    flex: 1;
    padding: 8px 16px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .interrupt-buttons button:hover { opacity: 0.85; }
  .interrupt-buttons button:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-approve { background: rgba(16,185,129,0.2); color: var(--success); border: 1px solid rgba(16,185,129,0.3) !important; }
  .btn-reject { background: rgba(248,113,113,0.2); color: var(--error); border: 1px solid rgba(248,113,113,0.3) !important; }

  /* ─── Typing indicator ─── */
  .typing-indicator {
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .typing-dots {
    display: flex;
    gap: 4px;
  }

  .typing-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: typing 1.4s infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1); }
  }

  .typing-text {
    font-size: 12px;
    color: var(--text-muted);
  }

  .typing-elapsed {
    font-size: 11px;
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
  }

  /* ─── Tool calls ─── */
  .tool-calls-group {
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding-left: 40px;
  }

  .tool-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
    background: rgba(16,185,129,0.08);
    border: 1px solid rgba(16,185,129,0.2);
    color: var(--success);
  }

  .tool-badge .tool-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--success);
  }

  .tool-badge .tool-elapsed {
    color: var(--text-muted);
    font-size: 11px;
    margin-left: 2px;
  }

  /* ─── Empty state ─── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-faint);
    gap: 12px;
  }

  .empty-state .logo {
    font-size: 40px;
    color: var(--accent);
    opacity: 0.3;
  }

  .empty-state p {
    font-size: 14px;
    color: var(--text-muted);
  }

  /* ─── Input area ─── */
  #input-area {
    padding: 16px 24px 20px;
    background: var(--bg-base);
    display: flex;
    justify-content: center;
  }

  #input-wrapper {
    display: flex;
    gap: 10px;
    max-width: 800px;
    width: 100%;
    align-items: flex-end;
  }

  #message-input {
    flex: 1;
    padding: 12px 16px;
    background: var(--bg-input);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    color: var(--text-primary);
    font-size: 14px;
    outline: none;
    resize: none;
    max-height: 120px;
    font-family: inherit;
    line-height: 1.5;
    transition: border-color 0.15s;
  }

  #message-input:focus { border-color: var(--accent-dim); }
  #message-input::placeholder { color: var(--text-faint); }

  #send-btn {
    width: 40px;
    height: 40px;
    background: var(--accent);
    color: var(--bg-base);
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ─── Mobile ─── */
  @media (max-width: 768px) {
    #sidebar { display: none; }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1><span>&#9670;</span> Jin비서</h1>
    <button id="new-chat-btn" title="새 채팅">+</button>
  </div>
  <div id="chat-list"></div>
  <div id="sidebar-footer">
    <div class="status-dot" id="status-dot"></div>
    <span id="connection-status">연결 중...</span>
  </div>
</div>

<!-- Main -->
<div id="main">
  <div id="chat-header">
    <span class="session-label" id="session-label">새 채팅</span>
  </div>

  <div id="chat-container">
    <div class="empty-state" id="empty-state">
      <div class="logo">&#9670;</div>
      <p>무엇이든 물어보세요</p>
    </div>
  </div>

  <div id="input-area">
    <div id="input-wrapper">
      <textarea id="message-input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
      <button id="send-btn">&#8593;</button>
    </div>
  </div>
</div>

<script>
// ─── State ───
const STORAGE_KEY = 'openclaw_chats';
let chats = [];        // [{id, title, messages: [{role, content}]}]
let activeId = null;
let ws = null;
let waiting = false;
let thinkingTimer = null;
let thinkingStart = 0;

// ─── DOM ───
const chatContainer = document.getElementById('chat-container');
const chatList = document.getElementById('chat-list');
const messageInput = document.getElementById('message-input');
const sendBtn = document.getElementById('send-btn');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('connection-status');
const sessionLabel = document.getElementById('session-label');
const emptyState = document.getElementById('empty-state');

// ─── Storage ───
function loadChats() {
  try {
    chats = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch { chats = []; }
}

function saveChats() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(chats));
}

function getChat(id) {
  return chats.find(c => c.id === id);
}

// ─── Chat management ───
function createChat() {
  const id = crypto.randomUUID().replace(/-/g, '').slice(0, 12);
  const chat = { id, title: '새 채팅', messages: [] };
  chats.unshift(chat);
  saveChats();
  switchChat(id);
  renderChatList();
}

function deleteChat(id) {
  chats = chats.filter(c => c.id !== id);
  saveChats();
  if (activeId === id) {
    if (chats.length > 0) {
      switchChat(chats[0].id);
    } else {
      createChat();
    }
  }
  renderChatList();
}

function switchChat(id) {
  if (activeId === id && ws && ws.readyState === WebSocket.OPEN) return;

  activeId = id;
  const chat = getChat(id);
  sessionLabel.textContent = chat ? chat.title : '새 채팅';

  renderMessages();
  renderChatList();
  connectWS(id);
}

function updateChatTitle(id, firstMsg) {
  const chat = getChat(id);
  if (!chat || chat.title !== '새 채팅') return;
  chat.title = firstMsg.slice(0, 30) + (firstMsg.length > 30 ? '...' : '');
  saveChats();
  renderChatList();
  if (activeId === id) sessionLabel.textContent = chat.title;
}

// ─── Render sidebar ───
function renderChatList() {
  chatList.innerHTML = '';
  chats.forEach(chat => {
    const item = document.createElement('div');
    item.className = `chat-item${chat.id === activeId ? ' active' : ''}`;
    item.innerHTML = `
      <span class="chat-item-title">${escapeHtml(chat.title)}</span>
      <button class="chat-item-delete" title="삭제">&times;</button>
    `;
    item.querySelector('.chat-item-title').addEventListener('click', () => switchChat(chat.id));
    item.querySelector('.chat-item-delete').addEventListener('click', (e) => {
      e.stopPropagation();
      deleteChat(chat.id);
    });
    chatList.appendChild(item);
  });
}

// ─── Render messages ───
function renderMessages() {
  chatContainer.innerHTML = '';
  const chat = getChat(activeId);
  if (!chat || chat.messages.length === 0) {
    chatContainer.innerHTML = `
      <div class="empty-state">
        <div class="logo">&#9670;</div>
        <p>무엇이든 물어보세요</p>
      </div>`;
    return;
  }

  chat.messages.forEach(msg => {
    if (msg.role === 'user') {
      appendUserMsg(msg.content, false);
    } else if (msg.role === 'assistant') {
      appendAssistantMsg(msg.content, false);
    } else if (msg.role === 'error') {
      appendError(msg.content, false);
    }
  });
  scrollBottom();
}

function appendUserMsg(content, save = true) {
  removeEmpty();
  const group = document.createElement('div');
  group.className = 'message-group user';
  group.innerHTML = `
    <div class="msg-content user-msg">${escapeHtml(content)}</div>
    <div class="msg-avatar user-avatar">U</div>
  `;
  chatContainer.appendChild(group);
  scrollBottom();

  if (save) {
    const chat = getChat(activeId);
    if (chat) {
      chat.messages.push({ role: 'user', content });
      saveChats();
    }
  }
}

function appendAssistantMsg(content, save = true) {
  removeEmpty();
  const group = document.createElement('div');
  group.className = 'message-group';
  group.innerHTML = `
    <div class="msg-avatar assistant-avatar">&#9670;</div>
    <div class="msg-content assistant-msg">${marked.parse(content)}</div>
  `;
  chatContainer.appendChild(group);
  scrollBottom();

  if (save) {
    const chat = getChat(activeId);
    if (chat) {
      chat.messages.push({ role: 'assistant', content });
      saveChats();
    }
  }
}

function appendError(content, save = true) {
  removeEmpty();
  const div = document.createElement('div');
  div.className = 'error-msg';
  div.textContent = content;
  chatContainer.appendChild(div);
  scrollBottom();

  if (save) {
    const chat = getChat(activeId);
    if (chat) {
      chat.messages.push({ role: 'error', content });
      saveChats();
    }
  }
}

function showInterrupt(actions) {
  const card = document.createElement('div');
  card.className = 'interrupt-card';

  let html = '<h3>&#9888; 확인 필요</h3>';
  actions.forEach((action, i) => {
    const argsText = Object.entries(action.args)
      .map(([k, v]) => `  ${k}: ${typeof v === 'object' ? JSON.stringify(v) : v}`)
      .join('\n') || '(없음)';
    html += `
      <div class="interrupt-action">
        <div class="tool-name">${i + 1}. ${escapeHtml(action.name)}</div>
        <div class="tool-args">${escapeHtml(argsText)}</div>
      </div>`;
  });
  html += `
    <div class="interrupt-buttons">
      <button class="btn-approve" onclick="respondInterrupt(true, this)">승인</button>
      <button class="btn-reject" onclick="respondInterrupt(false, this)">거절</button>
    </div>`;

  card.innerHTML = html;
  chatContainer.appendChild(card);
  scrollBottom();
}

function showTyping() {
  removeTyping();
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="msg-avatar assistant-avatar">&#9670;</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>
    <span class="typing-text">생각 중</span>
    <span class="typing-elapsed" id="thinking-elapsed"></span>
  `;
  chatContainer.appendChild(div);
  scrollBottom();
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function startThinkingTimer() {
  stopThinkingTimer();
  thinkingStart = Date.now();
  thinkingTimer = setInterval(() => {
    const el = document.getElementById('thinking-elapsed');
    if (el) {
      const sec = ((Date.now() - thinkingStart) / 1000).toFixed(1);
      el.textContent = `${sec}s`;
    }
  }, 100);
}

function stopThinkingTimer() {
  if (thinkingTimer) {
    clearInterval(thinkingTimer);
    thinkingTimer = null;
  }
}

function appendToolCalls(calls, elapsed) {
  const div = document.createElement('div');
  div.className = 'tool-calls-group';
  calls.forEach(c => {
    const badge = document.createElement('span');
    badge.className = 'tool-badge';
    badge.innerHTML = `<span class="tool-dot"></span>${escapeHtml(c.name)}`;
    if (elapsed) {
      badge.innerHTML += `<span class="tool-elapsed">${elapsed}s</span>`;
    }
    div.appendChild(badge);
  });
  chatContainer.appendChild(div);
  scrollBottom();
}

function removeEmpty() {
  const el = chatContainer.querySelector('.empty-state');
  if (el) el.remove();
}

function scrollBottom() {
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ─── WebSocket ───
function connectWS(sessionId) {
  if (ws) { ws.onclose = null; ws.close(); }

  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${location.host}/ws/chat?session_id=${sessionId}`);

  ws.onopen = () => {
    statusDot.classList.remove('disconnected');
    statusText.textContent = '연결됨';
    updateUI();
  };

  ws.onclose = () => {
    statusDot.classList.add('disconnected');
    statusText.textContent = '연결 끊김';
    waiting = false;
    updateUI();
    setTimeout(() => { if (activeId === sessionId) connectWS(sessionId); }, 3000);
  };

  ws.onerror = () => {
    statusDot.classList.add('disconnected');
    statusText.textContent = '연결 오류';
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === 'thinking_start') {
      showTyping();
      startThinkingTimer();
    } else if (data.type === 'thinking_end') {
      stopThinkingTimer();
      removeTyping();
    } else if (data.type === 'tool_calls') {
      appendToolCalls(data.calls, data.elapsed);
    } else if (data.type === 'response') {
      stopThinkingTimer();
      removeTyping();
      appendAssistantMsg(data.content);
      waiting = false;
      updateUI();
    } else if (data.type === 'interrupt') {
      stopThinkingTimer();
      removeTyping();
      showInterrupt(data.actions);
    } else if (data.type === 'error') {
      stopThinkingTimer();
      removeTyping();
      appendError(data.content);
      waiting = false;
      updateUI();
    }
  };
}

function respondInterrupt(approved, btn) {
  btn.parentElement.querySelectorAll('button').forEach(b => b.disabled = true);
  ws.send(JSON.stringify({ type: 'interrupt_response', approved }));
}

// ─── Send ───
function sendMessage() {
  const content = messageInput.value.trim();
  if (!content || waiting || !ws || ws.readyState !== WebSocket.OPEN) return;

  appendUserMsg(content);
  updateChatTitle(activeId, content);
  ws.send(JSON.stringify({ type: 'message', content }));
  messageInput.value = '';
  messageInput.style.height = 'auto';
  waiting = true;
  updateUI();
}

function updateUI() {
  const connected = ws && ws.readyState === WebSocket.OPEN;
  sendBtn.disabled = waiting || !connected;
  messageInput.disabled = waiting;
  if (!waiting) messageInput.focus();
}

// ─── Events ───
messageInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

messageInput.addEventListener('input', () => {
  messageInput.style.height = 'auto';
  messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
});

sendBtn.addEventListener('click', sendMessage);
document.getElementById('new-chat-btn').addEventListener('click', createChat);

// ─── Init ───
loadChats();
if (chats.length === 0) {
  createChat();
} else {
  renderChatList();
  switchChat(chats[0].id);
}
</script>
</body>
